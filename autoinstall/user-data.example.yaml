#cloud-config
autoinstall:
  version: 1
  identity:
    hostname: vast-bootstrap
    username: vastbootstrap
    # Replace with a real hashed password before use.
    password: "REPLACE_ME_WITH_A_REAL_HASH"
  ssh:
    install-server: true
    allow-pw: true
  packages:
    - openssh-server
    - curl
    - git
    - python3
    - sudo
  storage:
    layout:
      name: direct
  late-commands:
    - mkdir -p /target/opt/vast-host-installer
    - cp /cdrom/opt-vast-host-installer-overlay/vast-host-installer-payload.tgz /target/opt/vast-host-installer/
    - curtin in-target --target=/target -- bash -lc 'cd /opt/vast-host-installer && tar -xzf vast-host-installer-payload.tgz && rm -f vast-host-installer-payload.tgz && chmod +x /opt/vast-host-installer/bin/vast-host-installer || true'
    - curtin in-target --target=/target -- bash -lc 'echo "Run: sudo /opt/vast-host-installer/bin/vast-host-installer --first-run" > /etc/motd'
